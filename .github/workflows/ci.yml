name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Fast checks (every push / PR) ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate TOML files
        run: |
          echo "==> Cargo.toml"
          python3 -c "import tomllib; tomllib.load(open('Cargo.toml', 'rb'))" && echo "  OK"
          echo "==> cargo-generate.toml"
          python3 -c "import tomllib; tomllib.load(open('cargo-generate.toml', 'rb'))" && echo "  OK"
          echo "==> .cargo/config.toml"
          python3 -c "import tomllib; tomllib.load(open('.cargo/config.toml', 'rb'))" && echo "  OK"
          echo "==> rust-toolchain.toml"
          python3 -c "import tomllib; tomllib.load(open('rust-toolchain.toml', 'rb'))" && echo "  OK"

      - name: Validate Rhai pre-script syntax
        run: |
          # Basic syntax check: verify braces / keywords balance
          cat pre-script.rhai | grep -c 'let ' | xargs echo "  let statements:"
          echo "  (full Rhai validation requires rhai-run, skipped)"

      - name: Check chip list completeness (vs embassy-stm32 v0.6)
        run: |
          python3 .github/scripts/check-chips.py

  # ── Smoke test (one chip per Cortex variant) ───────────────────────────
  smoke:
    name: Smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: M3, chip: stm32f103c8, target: thumbv7m-none-eabi }
          - { name: M4, chip: stm32f401rc, target: thumbv7em-none-eabihf }
          - { name: M7, chip: stm32h743zi, target: thumbv7em-none-eabihf }
          - { name: M0P, chip: stm32g071rb, target: thumbv6m-none-eabi }
          - { name: M33, chip: stm32h563zi, target: thumbv8m.main-none-eabihf }
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache/
            ~/.cargo/registry/index/
            ~/.cargo/git/db/
          key: cargo-registry-${{ matrix.target }}-${{ hashFiles('Cargo.toml') }}
          restore-keys: |
            cargo-registry-${{ matrix.target }}-
            cargo-registry-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-generate
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate

      - name: Generate project
        run: |
          cargo generate --path . \
            --name ci-test \
            --define chip=${{ matrix.chip }} \
            --define license='["MIT"]' \
            --vcs none \
            --destination /tmp

      - name: Verify generated project
        run: |
          test -d /tmp/ci-test || { echo "ERROR: cargo-generate did not create /tmp/ci-test/"; exit 1; }
          test -f /tmp/ci-test/Cargo.toml || { echo "ERROR: Cargo.toml missing"; exit 1; }
          grep -n '{{' /tmp/ci-test/Cargo.toml && { echo "ERROR: unsubstituted placeholder"; exit 1; }
          echo "Generated project OK"

      - name: cargo check (bin + tests)
        run: cd /tmp/ci-test && cargo check --tests

      - name: cargo build (compile firmware)
        run: cd /tmp/ci-test && cargo build

      - name: cargo test --no-run (compile test ELF)
        run: cd /tmp/ci-test && cargo test --no-run
